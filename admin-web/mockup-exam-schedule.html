<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>시험일정 관리 UI 목업</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- ===================== 탭 네비 (참고용) ===================== -->
<div class="flex">

  <!-- 사이드바 -->
  <div class="w-56 min-h-screen bg-gray-800 text-gray-300 py-2 shrink-0">
    <div class="mx-2 my-0.5 flex h-11 items-center rounded-lg px-3 text-gray-400 hover:bg-gray-700 cursor-pointer">
      <span class="w-10 text-base">📋</span><span class="text-sm">연습문항 관리</span>
    </div>
    <div class="mx-2 my-0.5 flex h-11 items-center rounded-lg px-3 text-gray-400 hover:bg-gray-700 cursor-pointer">
      <span class="w-10 text-base">🏗</span><span class="text-sm">문항구조 관리</span>
    </div>
    <div class="mx-2 my-0.5 flex h-11 items-center rounded-lg px-3 text-gray-400 hover:bg-gray-700 cursor-pointer">
      <span class="w-10 text-base">📂</span><span class="text-sm">문항유형 관리</span>
    </div>
    <div class="mx-2 my-0.5 flex h-11 items-center rounded-lg px-3 text-gray-400 hover:bg-gray-700 cursor-pointer">
      <span class="w-10 text-base">🏅</span><span class="text-sm">등급 관리</span>
    </div>
    <!-- 활성 메뉴 -->
    <div class="relative mx-2 my-0.5 flex h-11 items-center rounded-lg bg-blue-600/20 text-white cursor-pointer px-3">
      <div class="absolute bottom-1.5 left-0 top-1.5 w-1 rounded-r bg-blue-500"></div>
      <span class="w-10 text-base">📅</span><span class="text-sm">시험일정 관리</span>
    </div>
    <div class="mx-4 my-2 border-t border-gray-600"></div>
    <div class="mx-2 my-0.5 flex h-11 items-center rounded-lg px-3 text-gray-400 hover:bg-gray-700 cursor-pointer">
      <span class="w-10 text-base">🔐</span><span class="text-sm">관리자 관리</span>
    </div>
  </div>

  <!-- 메인 영역 -->
  <div class="flex-1 p-6">

    <!-- ===== 목록 화면 ===== -->
    <div id="listView">
      <h2 class="mb-4 text-xl font-bold text-gray-800">시험일정 관리</h2>

      <!-- 검색바 -->
      <div class="mb-4 flex items-center gap-3 rounded-lg border border-gray-200 bg-white px-4 py-3 shadow-sm">
        <div class="flex items-center gap-2">
          <label class="whitespace-nowrap text-sm font-medium text-gray-700">시험종류</label>
          <select class="min-w-[120px] rounded border border-gray-300 px-3 py-1.5 text-sm">
            <option>전체</option>
            <option selected>IBT</option>
            <option>PBT</option>
          </select>
        </div>
        <button class="rounded bg-blue-600 px-4 py-1.5 text-sm text-white hover:bg-blue-700">조회</button>
        <div class="ml-auto">
          <button onclick="openModal('register')" class="rounded bg-green-600 px-4 py-1.5 text-sm text-white hover:bg-green-700">+ 등록</button>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600">
            <tr>
              <th class="px-4 py-3 text-center font-medium w-24">시험종류</th>
              <th class="px-4 py-3 text-center font-medium w-20">회차</th>
              <th class="px-4 py-3 text-center font-medium w-16">지역 수</th>
              <th class="px-4 py-3 text-left font-medium">지역 목록</th>
              <th class="px-4 py-3 text-center font-medium w-44">등록일시</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr onclick="openModal('edit')" class="cursor-pointer hover:bg-blue-50 transition-colors">
              <td class="px-4 py-3 text-center text-gray-700">IBT</td>
              <td class="px-4 py-3 text-center text-gray-700">109</td>
              <td class="px-4 py-3 text-center">
                <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs text-blue-700">3</span>
              </td>
              <td class="px-4 py-3 text-gray-600 text-xs">한국 · 아시아 · 미주</td>
              <td class="px-4 py-3 text-center text-gray-500">2026-03-10 09:00:00</td>
            </tr>
            <tr onclick="openModal('edit')" class="cursor-pointer hover:bg-blue-50 transition-colors">
              <td class="px-4 py-3 text-center text-gray-700">IBT</td>
              <td class="px-4 py-3 text-center text-gray-700">108</td>
              <td class="px-4 py-3 text-center">
                <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs text-blue-700">2</span>
              </td>
              <td class="px-4 py-3 text-gray-600 text-xs">한국 · 유럽</td>
              <td class="px-4 py-3 text-center text-gray-500">2026-02-05 14:22:11</td>
            </tr>
            <tr onclick="openModal('edit')" class="cursor-pointer hover:bg-blue-50 transition-colors">
              <td class="px-4 py-3 text-center text-gray-700">PBT</td>
              <td class="px-4 py-3 text-center text-gray-700">13</td>
              <td class="px-4 py-3 text-center">
                <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs text-blue-700">4</span>
              </td>
              <td class="px-4 py-3 text-gray-600 text-xs">한국 · 아시아 · 미주 · 유럽</td>
              <td class="px-4 py-3 text-center text-gray-500">2026-01-20 11:05:33</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="mt-4 flex items-center justify-center gap-1 text-sm">
        <button class="rounded border px-3 py-1 text-gray-500 hover:bg-gray-100">이전</button>
        <button class="rounded border bg-blue-600 px-3 py-1 text-white">1</button>
        <button class="rounded border px-3 py-1 text-gray-600 hover:bg-gray-100">2</button>
        <button class="rounded border px-3 py-1 text-gray-500 hover:bg-gray-100">다음</button>
      </div>
    </div>

  </div>
</div>

<!-- ===================== 등록 팝업 ===================== -->
<div id="registerModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40">
  <div class="w-[520px] rounded-lg bg-white shadow-2xl">
    <!-- 헤더 -->
    <div class="flex items-center justify-between border-b px-6 py-4">
      <h3 class="text-base font-semibold text-gray-800">시험일정 등록</h3>
      <button onclick="closeModal('registerModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>

    <!-- 본문 -->
    <div class="px-6 py-5 space-y-4">
      <!-- 시험종류 -->
      <div class="flex items-center">
        <label class="w-24 shrink-0 text-sm font-medium text-gray-700">시험종류</label>
        <select class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm">
          <option value=""></option>
          <option>IBT</option>
          <option>PBT</option>
        </select>
      </div>
      <!-- 회차 -->
      <div class="flex items-center">
        <label class="w-24 shrink-0 text-sm font-medium text-gray-700">회차</label>
        <input type="number" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
      </div>

      <hr class="border-gray-200" />

      <!-- 지역별 일정 -->
      <div>
        <div class="mb-2 text-sm font-medium text-gray-700">지역별 시험일</div>
        <div class="space-y-2" id="locationRows">
          <!-- 행 1 -->
          <div class="flex items-center gap-2">
            <select class="w-36 rounded border border-gray-300 px-3 py-2 text-sm">
              <option>한국</option>
              <option>아시아</option>
              <option>미주</option>
              <option>유럽</option>
            </select>
            <input type="date" value="2026-04-13" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
            <button class="text-gray-400 hover:text-red-500 text-lg leading-none px-1">✕</button>
          </div>
          <!-- 행 2 -->
          <div class="flex items-center gap-2">
            <select class="w-36 rounded border border-gray-300 px-3 py-2 text-sm">
              <option>한국</option>
              <option selected>아시아</option>
              <option>미주</option>
              <option>유럽</option>
            </select>
            <input type="date" value="2026-04-20" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
            <button class="text-gray-400 hover:text-red-500 text-lg leading-none px-1">✕</button>
          </div>
        </div>
        <!-- 행 추가 버튼 -->
        <button class="mt-3 flex items-center gap-1 rounded border border-dashed border-blue-400 px-3 py-1.5 text-sm text-blue-500 hover:bg-blue-50 w-full justify-center">
          + 지역 추가
        </button>
      </div>
    </div>

    <!-- 푸터 -->
    <div class="flex justify-end gap-2 border-t px-6 py-4">
      <button onclick="closeModal('registerModal')" class="rounded border border-gray-300 px-4 py-2 text-sm text-gray-600 hover:bg-gray-50">취소</button>
      <button class="rounded bg-blue-600 px-4 py-2 text-sm text-white hover:bg-blue-700">저장</button>
    </div>
  </div>
</div>

<!-- ===================== 수정 팝업 ===================== -->
<div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40">
  <div class="w-[520px] rounded-lg bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b px-6 py-4">
      <h3 class="text-base font-semibold text-gray-800">시험일정 수정</h3>
      <button onclick="closeModal('editModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>

    <div class="px-6 py-5 space-y-4">
      <!-- 시험종류 (읽기전용) -->
      <div class="flex items-center">
        <label class="w-24 shrink-0 text-sm font-medium text-gray-700">시험종류</label>
        <input type="text" value="IBT" readonly class="flex-1 rounded border border-gray-300 bg-gray-100 px-3 py-2 text-sm" />
      </div>
      <!-- 회차 (읽기전용) -->
      <div class="flex items-center">
        <label class="w-24 shrink-0 text-sm font-medium text-gray-700">회차</label>
        <input type="number" value="109" readonly class="flex-1 rounded border border-gray-300 bg-gray-100 px-3 py-2 text-sm" />
      </div>

      <hr class="border-gray-200" />

      <!-- 지역별 일정 (수정 가능) -->
      <div>
        <div class="mb-2 text-sm font-medium text-gray-700">지역별 시험일</div>
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <select class="w-36 rounded border border-gray-300 px-3 py-2 text-sm">
              <option selected>한국</option><option>아시아</option><option>미주</option><option>유럽</option>
            </select>
            <input type="date" value="2026-04-13" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
            <button class="text-gray-400 hover:text-red-500 text-lg leading-none px-1">✕</button>
          </div>
          <div class="flex items-center gap-2">
            <select class="w-36 rounded border border-gray-300 px-3 py-2 text-sm">
              <option>한국</option><option selected>아시아</option><option>미주</option><option>유럽</option>
            </select>
            <input type="date" value="2026-04-20" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
            <button class="text-gray-400 hover:text-red-500 text-lg leading-none px-1">✕</button>
          </div>
          <div class="flex items-center gap-2">
            <select class="w-36 rounded border border-gray-300 px-3 py-2 text-sm">
              <option>한국</option><option>아시아</option><option selected>미주</option><option>유럽</option>
            </select>
            <input type="date" value="2026-04-27" class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm" />
            <button class="text-gray-400 hover:text-red-500 text-lg leading-none px-1">✕</button>
          </div>
        </div>
        <button class="mt-3 flex items-center gap-1 rounded border border-dashed border-blue-400 px-3 py-1.5 text-sm text-blue-500 hover:bg-blue-50 w-full justify-center">
          + 지역 추가
        </button>
      </div>
    </div>

    <div class="flex justify-between border-t px-6 py-4">
      <button class="rounded border border-red-300 px-4 py-2 text-sm text-red-500 hover:bg-red-50">삭제</button>
      <div class="flex gap-2">
        <button onclick="closeModal('editModal')" class="rounded border border-gray-300 px-4 py-2 text-sm text-gray-600 hover:bg-gray-50">취소</button>
        <button class="rounded bg-blue-600 px-4 py-2 text-sm text-white hover:bg-blue-700">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
  function openModal(type) {
    if (type === 'register') {
      document.getElementById('registerModal').classList.remove('hidden');
      document.getElementById('registerModal').classList.add('flex');
    } else {
      document.getElementById('editModal').classList.remove('hidden');
      document.getElementById('editModal').classList.add('flex');
    }
  }
  function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
    document.getElementById(id).classList.remove('flex');
  }
</script>
</body>
</html>
